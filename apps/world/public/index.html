<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agentic Island</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 20px; font-family: monospace; color: #aaa; }
    #status { margin-bottom: 12px; font-size: 13px; letter-spacing: 0.05em; }
    #status.connected { color: #4caf50; }
    #status.disconnected { color: #f44; }
    #meta { margin-top: 10px; font-size: 12px; color: #555; }
    #display-container { overflow: auto; max-width: 100%; }
    #display-container canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
  <div id="status" class="disconnected">⬤ disconnected</div>
  <div id="display-container"></div>
  <div id="meta"></div>
  <script src="client.js"></script>
</body>
</html>
