resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    # API calls → hub-api
    location /api/ {
        set $hubapi hub-api:3001;
        proxy_pass http://$hubapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Sprite assets → hub-api
    location /sprites/ {
        set $hubapi hub-api:3001;
        proxy_pass http://$hubapi;
    }

    # MCP proxy → hub-api (StreamableHTTP + SSE, buffering must be off)
    location ~ ^/worlds/[^/]+/mcp(/.*)?$ {
        set $hubapi hub-api:3001;
        proxy_pass http://$hubapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # WebSocket → hub-api (with proper upgrade)
    location /ws/ {
        set $hubapi hub-api:3001;
        proxy_pass http://$hubapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Everything else → Next.js
    location / {
        set $nextjs web:3000;
        proxy_pass http://$nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
