services:
  proxy:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - HUB_PORT=3001
      - HUB_DB_PATH=/data/hub.db
      - SPRITE_CACHE_DIR=/data/sprites
    volumes:
      - hub-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_HUB_API_URL: http://api:3001
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hub-data:
